<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register Farmer</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<div class="container">

    <div class="card">

        <!-- TITLE -->

        <h1 class="register-title">
            🌾 Farmer Registration
        </h1>

        <p class="register-subtitle">
            Fill all farmer details carefully
        </p>

        <!-- FORM -->

        <form method="POST" enctype="multipart/form-data">

            <!-- ================= PERSONAL DETAILS ================= -->

            <div class="form-section">

                <h2>🌾 Personal Details</h2>

            </div>

            <input
                type="text"
                name="name"
                placeholder="Ex: Suyash Verma"
                required
            >

            <input
                type="text"
                name="father_name"
                placeholder="Ex: Ramesh Verma"
                required
            >

            <input
                type="text"
                name="mother_name"
                placeholder="Ex: Sunita Verma"
                required
            >

            <input
                type="text"
                id="mobile"
                name="mobile"
                placeholder="Ex: 9876543210"
                maxlength="10"
                required
            >

            <textarea
                class="full-width"
                name="address"
                placeholder="Ex: Village Rampur, Delhi"
                required
            ></textarea>

            <input
                type="text"
                id="aadhaar"
                name="aadhaar"
                placeholder="Ex: 123412341234"
                maxlength="12"
                required
            >

            <input
                type="text"
                id="pan"
                name="pan"
                placeholder="Ex: ABCDE1234F"
                maxlength="10"
                required
            >

            <!-- ================= FARMER IDS ================= -->

            <div class="form-section">

                <h2>🧾 Farmer IDs</h2>

            </div>

            <input
                type="text"
                name="kisan_id_1"
                placeholder="Ex: KISAN12345"
                required
            >

            <input
                type="text"
                name="kisan_id_2"
                placeholder="Ex: FARM67890"
                required
            >

            <input
                type="text"
                name="pm_kisan_id"
                placeholder="Ex: PMKISAN4587"
                required
            >

            <!-- ================= BANK DETAILS ================= -->

            <div class="form-section">

                <h2>🏦 Bank Details</h2>

            </div>

            <input
                type="text"
                id="account_number"
                name="account_number"
                placeholder="Ex: 458796321478"
                required
            >

            <input
                type="text"
                id="confirm_account_number"
                placeholder="Confirm Account Number"
                required
            >

            <input
                type="text"
                name="bank_name"
                placeholder="Ex: State Bank of India"
                required
            >

            <input
                type="text"
                name="ifsc_code"
                placeholder="Ex: SBIN0004587"
                required
            >

            <input
                type="text"
                name="branch_name"
                placeholder="Ex: Delhi Main Branch"
                required
            >

            <!-- ================= PHOTO SECTION ================= -->

            <div class="upload-box full-width">

                <label for="photo" class="upload-label">

                    <div class="upload-content">

                        <h3>📸 Upload Farmer Photo</h3>

                        <p>
                            JPG, JPEG or PNG only • Max Size 2MB
                        </p>

                    </div>

                </label>

                <input
                    class="file-input"
                    type="file"
                    id="photo"
                    name="photo"
                    accept=".jpg,.jpeg,.png"
                    required
                >

                <img
                    id="preview"
                    class="preview-image"
                    src=""
                    alt="Preview"
                >

            </div>

            <!-- ================= SUBMIT BUTTON ================= -->

            <button
                type="submit"
                class="submit-btn"
            >
                🌱 Register Farmer
            </button>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
