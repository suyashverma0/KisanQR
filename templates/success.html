{% extends "base.html" %}

{% block title %}Registration Successful{% endblock %}

{% block content %}

    <div class="card success-card">

        <div class="success-icon">✅</div>

        <h1>Farmer Registered Successfully</h1>

        <p>
            QR code generated for <strong>{{ farmer.name }}</strong>.
            Scan this QR to view the farmer's profile.
        </p>

        <img class="qr-image" src="{{ url_for('static', filename='qr_codes/' + farmer.qr_code) }}" alt="Farmer QR Code">

        <div class="success-buttons">

            <a href="{{ url_for('profile', farmer_id=farmer.id) }}" class="btn btn-primary">
                👤 View Profile
            </a>

            <a href="{{ url_for('static', filename='qr_codes/' + farmer.qr_code) }}" download class="btn btn-outline">
                ⬇️ Download QR
            </a>

            <a href="{{ url_for('register') }}" class="btn btn-outline">
                ➕ Register Another
            </a>

        </div>

    </div>

{% endblock %}
